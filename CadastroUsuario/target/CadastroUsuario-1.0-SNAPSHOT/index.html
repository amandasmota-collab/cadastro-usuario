<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Usuário</h1>

        <form action="cadastro" method="post">

            <!-- Nome -->
            <input 
                type="text" 
                name="nome" 
                id="nome" 
                placeholder="Nome completo"
                required
            >

            <!-- Email -->
            <input 
                type="email" 
                name="email" 
                id="email" 
                placeholder="E-mail"
                required
            >

            <!-- CPF -->
            <input 
                type="text" 
                name="cpf" 
                id="cpf" 
                placeholder="CPF (somente números)"
                required
            >

            <!-- Senha -->
            <input 
                type="password" 
                name="senha" 
                id="senha" 
                placeholder="Senha"
                required
            >

            <!-- Confirmar Senha -->
            <input 
                type="password" 
                name="confirmarSenha" 
                id="confirmarSenha" 
                placeholder="Confirmar senha"
                required
            >

            <!-- Botão -->
            <button type="submit">Cadastrar</button>

        </form>

        <!-- Área de mensagem -->
        <div id="mensagem">
            <!-- Mensagem do Java vai aparecer aqui -->
        </div>
    </div>

</body>
</html>
